name: orders
table: public.orders
descriptions:
  user: Orders placed through the storefront.
grain:
  - id
columns:
  - name: id
    type: number
  - name: status
    type: string
  - name: amount
    type: number
measures:
  - name: order_count
    expr: count(*)
  - name: total_revenue
    expr: sum(amount)
joins: []
